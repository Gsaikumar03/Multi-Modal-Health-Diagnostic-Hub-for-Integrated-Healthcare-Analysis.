<!DOCTYPE html>
<html>
<head>
    <title>Medical Chatbot</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:url('/static/bg.webp') no-repeat center center fixed; background-size:cover;">

<div class="container mt-5 bg-white p-5 rounded shadow">

    <h2 class="mb-4">🩺 Medical Chatbot</h2>

    <div id="chatBox"
         class="mb-3"
         style="height:300px; overflow-y:auto; border:1px solid #ccc; padding:10px; border-radius:10px;">
    </div>

    <form id="chatForm">
        <input
            type="text"
            class="form-control mb-2"
            id="question"
            placeholder="Ask medical question..."
            required
        >

        <button type="submit" class="btn btn-success">
            Send
        </button>
    </form>

</div>

<script>

const API_BASE = "/api";

document.getElementById("chatForm").addEventListener("submit", async function(e) {

    e.preventDefault();

    const questionInput = document.getElementById("question");
    const question = questionInput.value.trim();

    if (!question) return;

    const chatBox = document.getElementById("chatBox");

    // Show user message immediately
    chatBox.innerHTML += `
        <div class="mb-2">
            <strong>You:</strong> ${question}
        </div>
    `;

    // Temporary thinking message
    const thinkingId = "thinking-" + Date.now();

    chatBox.innerHTML += `
        <div id="${thinkingId}" class="mb-3 text-secondary">
            <strong>Bot:</strong> Thinking...
        </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;

    questionInput.value = "";

    try {

        const response = await fetch(`${API_BASE}/chat`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ question: question })
        });

        const data = await response.json();

        const botAnswer = data.answer || "Sorry, I could not generate an answer.";

        document.getElementById(thinkingId).innerHTML = `
            <strong>Bot:</strong> ${botAnswer}
        `;

    } catch (error) {

        document.getElementById(thinkingId).innerHTML = `
            <strong>Bot:</strong> Server error or timeout. Please try again.
        `;

    }

});

</script>

</body>
</html>
