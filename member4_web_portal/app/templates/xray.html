<!DOCTYPE html>
<html>
<head>
    <title>Pneumonia Detection</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:url('/static/bg.webp') no-repeat center center fixed; background-size:cover;">

<div class="container mt-5 bg-white p-5 rounded shadow">

    <h2 class="mb-4">🫁 Pneumonia X-ray Detection</h2>

    <form id="xrayForm" enctype="multipart/form-data">

        <input type="file"
               class="form-control mb-3"
               name="file"
               accept="image/*"
               required>

        <button type="submit" class="btn btn-primary">
            Upload & Predict
        </button>

    </form>

    <div id="result" class="mt-4"></div>

</div>

<script>

const API_BASE = "/api";

document.getElementById("xrayForm").addEventListener("submit", async function(e) {

    e.preventDefault();

    const formData = new FormData(this);

    const response = await fetch(`${API_BASE}/predict-xray`, {
        method: "POST",
        body: formData
    });

    const result = await response.json();

    document.getElementById("result").innerHTML = `
        <div class="alert alert-info">
            <strong>Prediction:</strong> ${result.prediction || "N/A"} <br>
            <strong>Confidence:</strong> ${
                result.confidence ? (result.confidence * 100).toFixed(2) + "%" : "N/A"
            }
        </div>
    `;

});

</script>

</body>
</html>
