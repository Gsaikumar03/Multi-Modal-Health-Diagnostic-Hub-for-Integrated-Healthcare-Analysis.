<!DOCTYPE html>
<html>
<head>
    <title>Medical AI Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: url("/static/bg.webp") no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0,0,0,0.75);
            min-height: 100vh;
            padding: 50px;
        }

        .card-custom {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            transition: 0.3s;
        }

        .card-custom:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
<div class="overlay text-white text-center">

    <h1 class="mb-4">🏥 Medical Diagnosis AI System</h1>

    <p class="lead">
        This platform integrates multiple AI systems:
        Heart Disease Prediction (ML),
        Pneumonia X-ray Detection (Deep Learning),
        and a Retrieval-Augmented Medical Chatbot.
    </p>

    <div class="row mt-5 justify-content-center">

        <div class="col-md-3">
            <div class="card card-custom p-4 shadow">
                <h4>❤️ Heart Prediction</h4>
                <a href="/heart" class="btn btn-danger mt-3">Open</a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-custom p-4 shadow">
                <h4>🫁 X-ray Detection</h4>
                <a href="/xray" class="btn btn-primary mt-3">Open</a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-custom p-4 shadow">
                <h4>💬 Medical Chatbot</h4>
                <a href="/chatbot" class="btn btn-success mt-3">Open</a>
            </div>
        </div>

    </div>
</div>
</body>
</html>
