<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Prediction</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: url("/static/bg.webp") no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0,0,0,0.75);
            min-height: 100vh;
            padding: 40px;
        }

        .card-custom {
            background: rgba(255,255,255,0.97);
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="overlay">
    <div class="container">
        <div class="card card-custom p-4 shadow-lg">

            <h2 class="text-center mb-4">❤️ Heart Disease Prediction</h2>

            <form id="heartForm">
                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" name="Age" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Sex</label>
                        <select name="Sex" class="form-select">
                            <option value="1">Male</option>
                            <option value="0">Female</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Chest Pain Type</label>
                        <select name="Chest pain type" class="form-select">
                            <option value="1">Typical Angina</option>
                            <option value="2">Atypical Angina</option>
                            <option value="3">Non-anginal Pain</option>
                            <option value="4">Asymptomatic</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Resting BP</label>
                        <input type="number" name="BP" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Cholesterol</label>
                        <input type="number" name="Cholesterol" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">FBS Over 120</label>
                        <select name="FBS over 120" class="form-select">
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">EKG Results</label>
                        <select name="EKG results" class="form-select">
                            <option value="0">Normal</option>
                            <option value="1">ST-T Abnormality</option>
                            <option value="2">LV Hypertrophy</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Max Heart Rate</label>
                        <input type="number" name="Max HR" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Exercise Angina</label>
                        <select name="Exercise angina" class="form-select">
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">ST Depression</label>
                        <input type="number" step="0.1" name="ST depression" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Slope of ST</label>
                        <select name="Slope of ST" class="form-select">
                            <option value="1">Upsloping</option>
                            <option value="2">Flat</option>
                            <option value="3">Downsloping</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Number of Vessels (0–3)</label>
                        <input type="number" name="Number of vessels fluro" min="0" max="3" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Thallium</label>
                        <select name="Thallium" class="form-select">
                            <option value="3">Normal</option>
                            <option value="6">Fixed Defect</option>
                            <option value="7">Reversible Defect</option>
                        </select>
                    </div>

                </div>

                <button type="submit" class="btn btn-danger w-100 mt-3">
                    Predict
                </button>
            </form>

            <div id="result" class="mt-4"></div>

        </div>
    </div>
</div>

<script>

const API_BASE = "/api";

document.getElementById("heartForm").addEventListener("submit", async function(e) {

    e.preventDefault();

    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    const response = await fetch(`${API_BASE}/predict-heart`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await response.json();

    let alertClass = "alert-info";

    if(result.prediction && result.prediction.toLowerCase().includes("high")) {
        alertClass = "alert-danger";
    }
    else if(result.prediction && result.prediction.toLowerCase().includes("low")) {
        alertClass = "alert-success";
    }

    document.getElementById("result").innerHTML = `
        <div class="alert ${alertClass}">
            <h5>Prediction Result</h5>
            <p><strong>Risk Level:</strong> ${result.prediction || "N/A"}</p>
            <p><strong>Probability:</strong> ${
                result.probability ? (result.probability * 100).toFixed(2) + "%" : "N/A"
            }</p>
        </div>
    `;

});

</script>

</body>
</html>
